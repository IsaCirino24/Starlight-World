<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estiloLogin.css">

</head>

<body>
    <!--NAVBAR-->
      <header class="cabecalho">
    <div class="navbar">

    <div class="logo">Starlight World</div>

    <ul class="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#membros">Membros</a></li>
      <li><a href="cadastro.html">Cadastro</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="login.html" class="login">Login</a></li>
    </ul>
      </div>
</header>
<div class="login-container"> 

  <div class="login-card">
    
<!--Titulo-->

  <h3  class="sub-login">Bem-vinda ARMY!!</h3>

    <label>E-mail</label>
    <input type="email" id="input_email" placeholder="seu@email.com">

    <label>Senha</label>
    <input type="password" id="input_senha" placeholder="******">



      <button onclick="entrar()">Entrar ✨</button>


    <p class="extra">
      Não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </p>

        <!-- CARD INFO -->
    

  </div>
  

</div>
</body>

</html>

<script>


    function entrar() {


        var emailVar = input_email.value;
        var senhaVar = input_senha.value;

        if (emailVar == "" || senhaVar == "") {

        alert("Preencha todos os campos!");
        return false;
    }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })

        }).then(function (resposta) {

            if (resposta.ok) {
                
                resposta.json().then(json => {
                    console.log(json);

                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                   
                    setTimeout(function () {
                        window.location = "./dashboard/quiz.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {
            resposta.text().then(texto => {
                console.error(texto);
                alert("E-mail ou senha inválidos!");
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }  
</script>
